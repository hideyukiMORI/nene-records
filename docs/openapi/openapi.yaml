                  value:
                    from: '2026-05-01'
                    to: '2026-05-03'
                    items:
                      - date: '2026-05-01'
                        request_count: 12
                        avg_duration_ms: 8.5
                      - date: '2026-05-02'
                        request_count: 7
                        avg_duration_ms: 11.2
