openapi: 3.1.0
info:
  title: NeNe Records API
  version: 0.1.0
  description: >
    NeNe Records public API contract — entity_types, field_defs, entities, tags, entity_tags, entity_relations, text_fields, int_fields, enum_fields, bool_fields, and datetime_fields CRUD (MVP + Phase 2 registry + Phase 3 tags/relations).
servers:
  - url: http://localhost:8080
    description: Local development server
tags:
  - name: Account
    description: Tenant self-serve account (plan, entitlements, usage).
  - name: Auth
    description: Authentication endpoints.
  - name: System
    description: Runtime health endpoints.
  - name: EntityTypes
    description: Entity type schema definitions.
  - name: Entities
    description: Entity instances bound to an entity type.
  - name: FieldDefs
    description: Registered field definitions per entity type.
  - name: TextFields
    description: Typed text field values on entities.
  - name: BlocksFields
    description: Typed post-block document values on entities (epic #486).
  - name: IntFields
    description: Typed integer field values on entities.
  - name: EnumFields
    description: Typed enum field values on entities.
  - name: BoolFields
    description: Typed boolean field values on entities.
  - name: DateTimeFields
    description: Typed datetime field values on entities.
  - name: Tags
    description: Tag definitions for entity classification.
  - name: EntityTags
    description: Tags attached to entity instances.
  - name: EntityRelations
    description: Typed relation links between entity instances.
  - name: Analytics
    description: HTTP access log aggregation and reporting.
  - name: PublicConsumer
    description: Aggregated read-only views for public consumer pages and MCP.
  - name: Settings
    description: Site-wide settings registry with revision history.
  - name: NavigationItems
    description: Ordered navigation link management for the public site header.
  - name: Webhooks
    description: Webhook endpoints for entity create/update/delete event notifications.
  - name: Users
    description: User account management (admin only) and self-service password change.
  - name: Themes
    description: Runtime (data-driven) public-site themes, registrable over MCP. See docs/theming/runtime-themes.md.
paths:
  /api/v1/auth/login:
    post:
      tags:
        - Auth
      summary: Admin login
      description: >-
        Authenticates with email/password. Sets the session token as an HttpOnly
        `nene_session` cookie (SameSite=Lax) and also returns it in the body for
        non-browser/machine clients.
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            example:
              email: admin@example.com
              password: secret
      responses:
        '200':
          description: Token issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
              example:
                token: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
                expires_at: '2026-05-25T00:00:00Z'
                email: admin@example.com
                role: admin
        '401':
          $ref: '#/components/responses/InvalidCredentials'
  /api/v1/auth/logout:
    post:
      tags:
        - Auth
      summary: Logout
      description: Clears the session cookie. Open endpoint (no authentication required).
      operationId: logout
      responses:
        '204':
          description: Session cookie cleared.
  /api/v1/public/signup:
    post:
      tags:
        - Signup
      summary: Public self-serve tenant signup
      description: >-
        Provisions a new tenant (organization + admin user, default content types
        auto-seeded) and signs the admin straight in, setting the session as an
        HttpOnly `nene_session` cookie. Open endpoint (no authentication, no tenant
        context). The slug becomes the tenant subdomain `{slug}.<base-domain>`.
      operationId: publicSignup
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignupRequest'
            example:
              organization_name: My Shop
              slug: my-shop
              email: owner@example.com
              password: a-strong-password
      responses:
        '201':
          description: Tenant provisioned and admin signed in.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SignupResponse'
              example:
                token: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
                expires_at: '2026-06-27T00:00:00Z'
                slug: my-shop
                org_id: 42
                email: owner@example.com
                role: admin
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationFailed'
        '429':
          $ref: '#/components/responses/TooManyRequests'
  /health:
    get:
      tags:
        - System
      summary: Health endpoint
      description: Operational health check (NENE2 runtime).
      operationId: getHealth
      responses:
        '200':
          description: Healthy response (no checks configured).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
              examples:
                ok:
                  summary: Healthy response (no checks)
                  value:
                    status: ok
                    service: NENE2
        '500':
          $ref: '#/components/responses/InternalServerError'
  /api/v1/entity-types:
    get:
      tags:
        - EntityTypes
      summary: List entity types
      description: Returns a paginated list of entity types.
      operationId: listEntityTypes
      parameters:
        - $ref: '#/components/parameters/LimitQuery'
        - $ref: '#/components/parameters/OffsetQuery'
      responses:
        '200':
          description: Paginated entity type list.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EntityTypeListResponse'
              examples:
                ok:
                  summary: Empty list
                  value:
                    items: []
                    limit: 20
                    offset: 0
        '422':
          $ref: '#/components/responses/ValidationFailed'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      tags:
        - EntityTypes
      summary: Create entity type
      description: Creates a new entity type with a unique slug.
      operationId: createEntityType
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateEntityTypeRequest'
            examples:
              ok:
                value:
                  name: Article
                  slug: article
      responses:
        '201':
          description: Entity type created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EntityTypeResponse'
              examples:
                ok:
                  value:
                    id: 1
                    name: Article
                    slug: article
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationFailed'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /api/v1/entity-types/reorder:
    put:
      tags:
        - EntityTypes
      summary: Reorder entity types
      description: >-
        Persists a new display order for the organization's entity types.
        Each id's display_order becomes its index in the provided array.
        This controls the order of pinned types in the admin sidebar and dashboard.
      operationId: reorderEntityTypes
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReorderEntityTypesRequest'
      responses:
        '204':
          description: Order updated.
        '422':
          $ref: '#/components/responses/ValidationFailed'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /api/v1/entity-types/{id}:
    get:
      tags:
        - EntityTypes
      summary: Get entity type by id
      operationId: getEntityTypeById
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: Entity type found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EntityTypeResponse'
              examples:
                ok:
                  value:
                    id: 1
                    name: Article
                    slug: article
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    put:
      tags:
        - EntityTypes
      summary: Update entity type
      operationId: updateEntityType
      parameters:
        - $ref: '#/components/parameters/IdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateEntityTypeRequest'
            examples:
              ok:
                value:
                  name: Blog Post
                  slug: blog-post
      responses:
        '200':
          description: Entity type updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EntityTypeResponse'
              examples:
                ok:
                  value:
                    id: 1
                    name: Blog Post
                    slug: blog-post
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationFailed'
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      tags:
        - EntityTypes
      summary: Delete entity type
      description: Permanently deletes an entity type (hard delete).
      operationId: deleteEntityType
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '204':
          description: Entity type deleted.
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /api/v1/entities:
    get:
      tags:
        - Entities
      summary: List entities
      description: Returns non-deleted entities, optionally filtered by entity type, status, tags, relation fields, and full-text search.
      operationId: listEntities
      parameters:
        - $ref: '#/components/parameters/LimitQuery'
        - $ref: '#/components/parameters/OffsetQuery'
        - $ref: '#/components/parameters/EntityTypeIdQuery'
        - name: status
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/EntityStatus'
          description: Filter by publish status.
        - $ref: '#/components/parameters/TagsQuery'
        - $ref: '#/components/parameters/TagQuery'
        - $ref: '#/components/parameters/RelationFilterQuery'
        - name: q
          in: query
          required: false
          schema:
            type: string
            minLength: 1
          description: Full-text search across slug and text field values (partial match).
        - name: published_from
          in: query
          required: false
          schema:
            type: string
            format: date
          description: Only entities published on or after this date (YYYY-MM-DD).
        - name: published_to
          in: query
          required: false
          schema:
            type: string
            format: date
          description: Only entities published on or before this date, inclusive (YYYY-MM-DD).
        - name: sort
          in: query
          required: false
          schema:
            type: string
            enum: [id, published_at, title]
            default: id
          description: Sort key. `title` joins the `title` text field value.
        - name: order
          in: query
          required: false
          schema:
            type: string
            enum: [asc, desc]
            default: desc
          description: Sort direction.
      responses:
        '200':
          description: Paginated entity list.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EntityListResponse'
              examples:
                ok:
                  summary: Empty list
                  value:
                    items: []
                    limit: 20
                    offset: 0
                    total: 0
        '422':
          $ref: '#/components/responses/ValidationFailed'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      tags:
        - Entities
      summary: Create entity
      operationId: createEntity
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateEntityRequest'
            examples:
              ok:
                value:
                  entity_type_id: 1
      responses:
        '201':
          description: Entity created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EntityResponse'
              examples:
                ok:
                  value:
                    id: 1
                    entity_type_id: 1
                    status: draft
                    published_at: null
                    scheduled_at: null
                    is_deleted: false
                    deleted_at: null
                    meta_title: null
                    meta_description: null
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationFailed'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /api/v1/entities/export:
    get:
      tags:
        - Entities
      summary: Export entities
      description: Export non-deleted entities as CSV or JSON. Returns up to 10,000 records including all text field values.
      operationId: exportEntities
      parameters:
        - $ref: '#/components/parameters/EntityTypeIdQuery'
        - name: format
          in: query
          required: false
          schema:
            type: string
            enum: [json, csv]
            default: json
          description: Response format. Use `csv` to download a spreadsheet-compatible file.
        - name: status
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/EntityStatus'
          description: Filter by publish status.
        - name: q
          in: query
          required: false
          schema:
            type: string
            minLength: 1
          description: Full-text search across slug and text field values.
      responses:
        '200':
          description: Exported entity data.
          content:
            application/json:
              schema:
                type: object
                required: [items, total]
                properties:
                  items:
                    type: array
                    items:
                      type: object
                  total:
                    type: integer
            text/csv:
              schema:
                type: string
                format: binary
        '500':
          $ref: '#/components/responses/InternalServerError'
  /api/v1/entities/reorder:
    post:
      tags:
        - Entities
      summary: Set manual sibling order
      description: >
        Assigns `menu_order = position` to each record id in the given order, so the
        directory tree and public navigation reflect a manual order (#659).
      operationId: reorderEntities
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - ids
              properties:
                ids:
                  type: array
                  items:
                    type: integer
                    format: int64
                  description: Record ids in the desired order.
      responses:
        '200':
          description: Order applied.
          content:
            application/json:
              schema:
                type: object
                required:
                  - reordered
                properties:
                  reordered:
                    type: integer
                    description: Number of records whose order was set.
        '422':
          $ref: '#/components/responses/ValidationFailed'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /api/v1/entities/{id}:
    get:
      tags:
        - Entities
      summary: Get entity by id
      operationId: getEntityById
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: Entity found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EntityResponse'
              examples:
                ok:
                  value:
                    id: 1
                    entity_type_id: 1
                    status: draft
                    published_at: null
                    scheduled_at: null
                    is_deleted: false
                    deleted_at: null
                    meta_title: null
                    meta_description: null
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    put:
      tags:
        - Entities
      summary: Update entity
      operationId: updateEntity
      parameters:
        - $ref: '#/components/parameters/IdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateEntityRequest'
            examples:
              ok:
                value:
                  entity_type_id: 2
      responses:
        '200':
          description: Entity updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EntityResponse'
              examples:
                ok:
                  value:
                    id: 1
                    entity_type_id: 2
                    status: published
                    published_at: '2026-05-24T10:00:00+00:00'
                    scheduled_at: null
                    is_deleted: false
                    deleted_at: null
                    meta_title: null
                    meta_description: null
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationFailed'
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      tags:
        - Entities
      summary: Soft delete entity
      operationId: deleteEntity
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '204':
          description: Entity soft-deleted.
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /api/v1/entities/{id}/move:
    post:
      tags:
        - Entities
      summary: Move a record (and its subtree) to a new permalink
      description: >
        Rewrites the record's custom permalink prefix and every descendant's,
        recording a 301 for each changed path so existing links and search
        results follow the move — no descendant-URL avalanche (#659).
      operationId: moveEntity
      parameters:
        - $ref: '#/components/parameters/IdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - permalink
              properties:
                permalink:
                  type: string
                  description: The record's new custom permalink; its subtree follows.
                  example: /legal/about
      responses:
        '200':
          description: Move applied (or a no-op when dropped onto its current parent).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EntityMoveResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationFailed'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /api/v1/entities/{id}/revisions:
    get:
      tags:
        - Entities
      summary: List entity revisions
      description: Returns paginated revision history for an entity record.
      operationId: listEntityRevisions
      parameters:
        - $ref: '#/components/parameters/IdPath'
        - $ref: '#/components/parameters/LimitQuery'
        - $ref: '#/components/parameters/OffsetQuery'
      responses:
        '200':
          description: Paginated revision list.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EntityRevisionListResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /api/v1/entities/{id}/schedule:
    post:
      tags:
        - Entities
      summary: Schedule entity for future publish
      description: Sets the entity status to `scheduled` and stores the future publish datetime.
      operationId: scheduleEntity
      parameters:
        - $ref: '#/components/parameters/IdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ScheduleEntityRequest'
            examples:
              schedule:
                value:
                  scheduled_at: '2026-06-01T09:00:00+09:00'
      responses:
        '200':
          description: Entity scheduled.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScheduleEntityResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationFailed'
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      tags:
        - Entities
      summary: Cancel scheduled publish
      description: Cancels the scheduled publish and reverts the entity status to `draft`.
      operationId: unscheduleEntity
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '204':
          description: Schedule cancelled.
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /api/v1/entities/process-scheduled:
    post:
      tags:
        - Entities
      summary: Process scheduled publishes
      description: Publishes all entities whose `scheduled_at` has passed. Intended for cron job invocation.
      operationId: processScheduledPublish
      responses:
        '200':
          description: Result of the batch publish.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProcessScheduledPublishResponse'
              examples:
                ok:
                  value:
                    published_count: 2
                    published_ids: [10, 11]
        '500':
          $ref: '#/components/responses/InternalServerError'
  /api/v1/entities/{entityId}/tags:
    get:
      tags:
        - EntityTags
      summary: List tags attached to entity
      operationId: listEntityTags
      parameters:
        - $ref: '#/components/parameters/EntityIdPath'
      responses:
        '200':
          description: Tags attached to the entity.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EntityTagListResponse'
              examples:
                ok:
                  value:
                    items: []
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      tags:
        - EntityTags
      summary: Attach tag to entity
      operationId: attachEntityTag
      parameters:
        - $ref: '#/components/parameters/EntityIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AttachEntityTagRequest'
            examples:
              ok:
                value:
                  tag_id: 1
      responses:
        '201':
          description: Tag attached.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TagResponse'
              examples:
                ok:
                  value:
                    id: 1
                    slug: featured
                    name: Featured
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationFailed'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /api/v1/entities/{entityId}/tags/{tagId}:
    delete:
      tags:
        - EntityTags
      summary: Detach tag from entity
      operationId: detachEntityTag
      parameters:
        - $ref: '#/components/parameters/EntityIdPath'
        - $ref: '#/components/parameters/TagIdPath'
      responses:
        '204':
          description: Tag detached.
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /api/v1/entities/{entityId}/relations:
    get:
      tags:
        - EntityRelations
      summary: List relations attached to entity
      operationId: listEntityRelations
      parameters:
        - $ref: '#/components/parameters/EntityIdPath'
        - name: field_key
          in: query
          required: true
          schema:
            type: string
            minLength: 1
      responses:
        '200':
          description: Relations for the given field key.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EntityRelationListResponse'
              examples:
                ok:
                  value:
                    items: []
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationFailed'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      tags:
        - EntityRelations
      summary: Attach relation target to entity
      operationId: attachEntityRelation
      parameters:
        - $ref: '#/components/parameters/EntityIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AttachEntityRelationRequest'
            examples:
              ok:
                value:
                  field_key: author
                  target_entity_id: 2
      responses:
        '201':
          description: Relation attached.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EntityRelationItemResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationFailed'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /api/v1/entities/{entityId}/relations/{targetEntityId}:
    delete:
      tags:
        - EntityRelations
      summary: Detach relation target from entity
      operationId: detachEntityRelation
      parameters:
        - $ref: '#/components/parameters/EntityIdPath'
        - name: targetEntityId
          in: path
          required: true
          schema:
            type: integer
            format: int64
            minimum: 1
        - name: field_key
          in: query
          required: true
          schema:
            type: string
            minLength: 1
      responses:
        '204':
          description: Relation detached.
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationFailed'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /api/v1/field-defs:
    get:
      tags:
        - FieldDefs
      summary: List field definitions
