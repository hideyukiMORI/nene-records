components:
  parameters:
    IdPath:
      name: id
      in: path
      required: true
      schema:
        type: integer
        format: int64
        minimum: 1
      example: 1
    LimitQuery:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
      example: 20
    OffsetQuery:
      name: offset
      in: query
      required: false
      schema:
        type: integer
        minimum: 0
        default: 0
      example: 0
    EntityTypeIdQuery:
      name: entity_type_id
      in: query
      required: false
      schema:
        type: integer
        format: int64
        minimum: 1
      example: 1
    EntityIdQuery:
      name: entity_id
      in: query
      required: false
      schema:
        type: integer
        format: int64
        minimum: 1
      example: 1
    TagsQuery:
      name: tags
      in: query
      required: false
      description: Comma-separated tag slugs; entities matching any slug are returned.
      schema:
        type: string
      example: featured,draft
    TagQuery:
      name: tag
      in: query
      required: false
      description: Alias for a single tag slug or comma-separated slugs (merged with `tags`).
      schema:
        type: string
      example: featured
    RelationFilterQuery:
      name: relation.{field_key}
      in: query
      required: false
      description: |
        Filter entities linked via a relation field. Use one query parameter per field key,
        for example `relation.author=5`. Multiple relation filters are combined with AND.
        PHP query parsing may expose these keys as `relation_{field_key}` in the parameter array.
      schema:
        type: integer
        format: int64
        minimum: 1
      example: 5
    EntityIdPath:
      name: entityId
      in: path
      required: true
      schema:
        type: integer
        format: int64
        minimum: 1
      example: 1
    TagIdPath:
      name: tagId
      in: path
      required: true
      schema:
        type: integer
        format: int64
        minimum: 1
      example: 1
  responses:
    NotFound:
      description: Resource not found.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
          examples:
            notFound:
              value:
                type: https://nene-records.dev/problems/not-found
                title: Not Found
                status: 404
                detail: The requested resource was not found.
                instance: /api/v1/entity-types/99
    Conflict:
      description: Request conflicts with current state.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
          examples:
            conflict:
              value:
                type: https://nene-records.dev/problems/conflict
                title: Conflict
                status: 409
                detail: The slug is already in use.
                instance: /api/v1/entity-types
    FieldDefNotFound:
      description: Field definition not found.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
          examples:
            fieldDefNotFound:
              value:
                type: https://nene-records.dev/problems/field-def-not-found
                title: Field Definition Not Found
                status: 404
                detail: The requested field definition was not found.
                instance: /api/v1/field-defs/99
    FieldDefConflict:
      description: Duplicate field key for entity type.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
          examples:
            fieldDefConflict:
              value:
                type: https://nene-records.dev/problems/field-def-conflict
                title: Conflict
                status: 409
                detail: A field definition with this key already exists for the entity type.
                instance: /api/v1/field-defs
    FieldKeyNotRegistered:
      description: Field key is not registered for the entity type.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
          examples:
            fieldKeyNotRegistered:
              value:
                type: https://nene-records.dev/problems/field-key-not-registered
                title: Field Key Not Registered
                status: 422
                detail: The field key is not registered for this entity type.
                instance: /api/v1/text-fields
    FieldTypeMismatch:
      description: Field key is registered with a different data type.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
          examples:
            fieldTypeMismatch:
              value:
                type: https://nene-records.dev/problems/field-type-mismatch
                title: Field Type Mismatch
                status: 422
                detail: The field key is registered with a different data type.
                instance: /api/v1/text-fields
    ValidationFailed:
      description: Validation failed.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ValidationProblemDetails'
          examples:
            validationFailed:
              value:
                type: https://nene-records.dev/problems/validation-failed
                title: Validation Failed
                status: 422
                detail: One or more fields failed validation.
                instance: /api/v1/entity-types
                errors:
                  - field: slug
                    message: Slug is required.
                    code: required
    InternalServerError:
      description: Internal server error.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
          examples:
            internal:
              value:
                type: https://nene-records.dev/problems/internal-server-error
                title: Internal Server Error
                status: 500
                detail: An unexpected error occurred.
                instance: /api/v1/entity-types
  schemas:
    HealthResponse:
      type: object
      required:
        - status
        - service
      properties:
        status:
          type: string
          enum:
            - ok
            - degraded
        service:
          type: string
    ProblemDetails:
      type: object
      required:
        - type
        - title
        - status
        - instance
      properties:
        type:
          type: string
          format: uri
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
        instance:
          type: string
    ValidationProblemDetails:
      allOf:
        - $ref: '#/components/schemas/ProblemDetails'
        - type: object
          required:
            - errors
          properties:
            errors:
              type: array
              items:
                $ref: '#/components/schemas/ValidationError'
    ValidationError:
      type: object
      required:
        - field
        - message
        - code
      properties:
        field:
          type: string
        message:
          type: string
        code:
          type: string
    EntityTypeResponse:
      type: object
      required:
        - id
        - name
        - slug
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        slug:
          type: string
    CreateEntityTypeRequest:
      type: object
      required:
        - name
        - slug
      properties:
        name:
          type: string
          minLength: 1
        slug:
          type: string
          pattern: '^[a-z0-9]+(?:-[a-z0-9]+)*$'
      additionalProperties: false
    UpdateEntityTypeRequest:
      $ref: '#/components/schemas/CreateEntityTypeRequest'
    EntityTypeListResponse:
      type: object
      required:
        - items
        - limit
        - offset
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/EntityTypeResponse'
        limit:
          type: integer
        offset:
          type: integer
    EntityResponse:
      type: object
      required:
        - id
        - entity_type_id
        - is_deleted
        - deleted_at
      properties:
        id:
          type: integer
          format: int64
        entity_type_id:
          type: integer
          format: int64
        is_deleted:
          type: boolean
        deleted_at:
          type:
            - string
            - 'null'
          format: date-time
    CreateEntityRequest:
      type: object
      required:
        - entity_type_id
      properties:
        entity_type_id:
          type: integer
          format: int64
          minimum: 1
      additionalProperties: false
    UpdateEntityRequest:
      type: object
      required:
        - entity_type_id
      properties:
        entity_type_id:
          type: integer
          format: int64
          minimum: 1
      additionalProperties: false
    EntityListResponse:
      type: object
      required:
        - items
        - limit
        - offset
        - total
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/EntityResponse'
        limit:
          type: integer
        offset:
          type: integer
        total:
          type: integer
          minimum: 0
    TagResponse:
      type: object
      required:
        - id
        - slug
        - name
      properties:
        id:
          type: integer
          format: int64
        slug:
          type: string
        name:
          type: string
    CreateTagRequest:
      type: object
      required:
        - name
        - slug
      properties:
        name:
          type: string
          minLength: 1
        slug:
          type: string
          pattern: '^[a-z0-9]+(?:-[a-z0-9]+)*$'
      additionalProperties: false
    UpdateTagRequest:
      $ref: '#/components/schemas/CreateTagRequest'
    TagListResponse:
      type: object
      required:
        - items
        - limit
        - offset
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/TagResponse'
        limit:
