          description: The record's breadcrumb trail and direct child pages.
          headers:
            Cache-Control:
              schema:
                type: string
              example: public, max-age=60, stale-while-revalidate=300
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicRecordHierarchy'
