              $ref: '#/components/schemas/AdminResetPasswordRequest'
      responses:
        '204':
          description: Password updated.
        '401':
          description: Unauthorized.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '403':
          description: Forbidden.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationFailed'
  /api/v1/users/me/password:
    put:
      tags:
        - Users
      summary: Change own password
      description: Changes the authenticated user's own password. Requires current password verification.
      operationId: changeOwnPassword
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangeOwnPasswordRequest'
      responses:
        '204':
          description: Password changed.
        '401':
          description: Unauthorized.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '422':
          $ref: '#/components/responses/ValidationFailed'
  /api/v1/users/invite:
    post:
      tags:
        - Users
      summary: Invite user
      description: Creates an invited user and sends an email with an activation link. Admin only.
      operationId: inviteUser
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InviteUserRequest'
      responses:
        '201':
          description: Invite sent.
          headers:
            Location:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationFailed'
  /api/v1/auth/accept-invite:
    post:
      tags:
        - Users
      summary: Accept invite
      description: Accepts an invitation token and sets the user's password, activating the account.
      operationId: acceptInvite
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AcceptInviteRequest'
      responses:
        '204':
          description: Account activated.
        '422':
          $ref: '#/components/responses/ValidationFailed'
  /api/v1/auth/password-reset:
    post:
      tags:
        - Auth
      summary: Request password reset
      description: >
        Sends a password reset email. Always returns 204 regardless of whether
        the email exists (prevents email enumeration).
      operationId: requestPasswordReset
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordResetRequest'
      responses:
        '204':
          description: Reset email sent (or silently ignored if email not found).
        '422':
          $ref: '#/components/responses/ValidationFailed'
  /api/v1/auth/password-reset/confirm:
    post:
      tags:
        - Auth
      summary: Confirm password reset
      description: Validates the reset token and sets a new password.
      operationId: confirmPasswordReset
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordResetConfirmRequest'
      responses:
        '204':
          description: Password updated.
        '422':
          $ref: '#/components/responses/ValidationFailed'
  /api/v1/auth/verify-email:
    post:
      tags:
        - Auth
      summary: Verify a pending email change
      description: >-
        Confirms a pending email change using the verification token sent to the new
        address. The token may be supplied in the JSON body or as a `?token=` query
        parameter. On success the pending address becomes the user's email.
      operationId: verifyEmailChange
      parameters:
        - name: token
          in: query
          required: false
          schema:
            type: string
          description: Verification token (alternative to supplying it in the request body).
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyEmailRequest'
      responses:
        '204':
          description: Email change verified and applied.
        '409':
          $ref: '#/components/responses/Conflict'
        '410':
          $ref: '#/components/responses/Gone'
        '422':
          $ref: '#/components/responses/ValidationFailed'
  /api/v1/migration/wxr:
    post:
      tags:
        - Migration
      summary: Import a WordPress WXR export
      description: "Admin-only. Accepts a multipart/form-data WordPress WXR (.xml) export. With dry_run=true (default) returns a preview plan (what would be imported/skipped) without writing; with dry_run=false executes the import into the active organization (idempotent by slug). Out of scope: media attachments, 301 redirect map, postmeta."
      operationId: importWxr
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                  description: WordPress WXR export XML.
                dry_run:
                  type: string
                  enum: ['true', 'false']
                  default: 'true'
                  description: 'true = preview only; false = execute import.'
      responses:
        '200':
          description: Dry-run import plan (preview).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WxrImportPlanResponse'
        '201':
          description: Import executed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WxrImportResultResponse'
        '422':
          $ref: '#/components/responses/ValidationFailed'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /api/v1/migration/url-redirects:
    post:
      tags:
        - Migration
      summary: Bulk-import 301 redirects from a CSV
      description: "Admin-only. Accepts a multipart/form-data CSV of source,target path pairs (full old URLs are accepted — only the path is kept). With dry_run=true (default) validates and previews without writing; with dry_run=false upserts the redirects into the active organization (idempotent per source path). Keeps migrated WordPress URLs 1:1 (#651)."
      operationId: importUrlRedirectsCsv
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                  description: CSV with source,target path columns (an optional header row is detected and skipped).
                dry_run:
                  type: string
                  enum: ['true', 'false']
                  default: 'true'
                  description: 'true = preview only; false = execute the import.'
      responses:
        '200':
          description: Dry-run preview (nothing written).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RedirectCsvImportResponse'
        '201':
          description: Import executed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RedirectCsvImportResponse'
        '422':
          $ref: '#/components/responses/ValidationFailed'
        '500':
          $ref: '#/components/responses/InternalServerError'
components:
  parameters:
    IdPath:
      name: id
      in: path
      required: true
      schema:
        type: integer
        format: int64
        minimum: 1
      example: 1
    LimitQuery:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
      example: 20
    OffsetQuery:
      name: offset
      in: query
      required: false
      schema:
        type: integer
        minimum: 0
        default: 0
      example: 0
    EntityTypeIdQuery:
      name: entity_type_id
      in: query
      required: false
      schema:
        type: integer
        format: int64
        minimum: 1
      example: 1
    EntityIdQuery:
      name: entity_id
      in: query
      required: false
      schema:
        type: integer
        format: int64
        minimum: 1
      example: 1
    TagsQuery:
      name: tags
      in: query
      required: false
      description: Comma-separated tag slugs; entities matching any slug are returned.
      schema:
        type: string
      example: featured,draft
    TagQuery:
      name: tag
      in: query
      required: false
      description: Alias for a single tag slug or comma-separated slugs (merged with `tags`).
      schema:
        type: string
      example: featured
    RelationFilterQuery:
      name: relation.{field_key}
      in: query
      required: false
      description: |
        Filter entities linked via a relation field. Use one query parameter per field key,
        for example `relation.author=5`. Multiple relation filters are combined with AND.
        PHP query parsing may expose these keys as `relation_{field_key}` in the parameter array.
      schema:
        type: integer
        format: int64
        minimum: 1
      example: 5
    EntityIdPath:
      name: entityId
      in: path
      required: true
      schema:
        type: integer
        format: int64
        minimum: 1
      example: 1
    TagIdPath:
      name: tagId
      in: path
      required: true
      schema:
        type: integer
        format: int64
        minimum: 1
      example: 1
    SettingKeyPath:
      name: key
      in: path
      required: true
      schema:
        type: string
        pattern: '^[a-z][a-z0-9_]*$'
      example: site_name
  responses:
    Unauthorized:
      description: Unauthorized.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
    Forbidden:
      description: Forbidden.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
    InvalidCredentials:
      description: Email or password is incorrect.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
          examples:
            invalidCredentials:
              value:
                type: https://nene-records.dev/problems/invalid-credentials
                title: Invalid credentials
                status: 401
                detail: Email or password is incorrect.
    NotFound:
      description: Resource not found.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
          examples:
            notFound:
              value:
                type: https://nene-records.dev/problems/not-found
                title: Not Found
                status: 404
                detail: The requested resource was not found.
                instance: /api/v1/entity-types/99
    Conflict:
      description: Request conflicts with current state.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
          examples:
            conflict:
              value:
                type: https://nene-records.dev/problems/conflict
                title: Conflict
                status: 409
                detail: The slug is already in use.
                instance: /api/v1/entity-types
    MediaInUse:
      description: The media item is still referenced by one or more entity fields and cannot be deleted.
      content:
        application/problem+json:
          schema:
            allOf:
              - $ref: '#/components/schemas/ProblemDetails'
              - type: object
                properties:
                  usages:
                    type: array
                    items:
                      $ref: '#/components/schemas/MediaUsage'
          examples:
            mediaInUse:
              value:
                type: https://nene-records.dev/problems/media-in-use
                title: Media in use
                status: 409
                detail: Media 1 is still in use by 1 field(s).
                instance: /api/v1/media/1
                usages:
                  - entity_id: 7
                    entity_type_slug: post
                    entity_slug: hello-world
                    status: published
                    field_key: cover
                    title: Hello World
    Gone:
      description: The target resource is no longer available (e.g. an expired token).
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
          examples:
            gone:
              value:
                type: https://nene-records.dev/problems/gone
                title: Gone
                status: 410
                detail: Email verification token has expired.
                instance: /api/v1/auth/verify-email
    TooManyRequests:
      description: Rate limit exceeded.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
          examples:
            tooManyRequests:
              value:
                type: https://nene-records.dev/problems/too-many-requests
                title: Too Many Requests
                status: 429
                detail: Comment rate limit of 3 per 3600 seconds exceeded. Try again in 1800 seconds.
                instance: /api/v1/entities/1/comments
    FieldDefNotFound:
      description: Field definition not found.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
          examples:
            fieldDefNotFound:
              value:
                type: https://nene-records.dev/problems/field-def-not-found
                title: Field Definition Not Found
                status: 404
                detail: The requested field definition was not found.
                instance: /api/v1/field-defs/99
    FieldDefConflict:
      description: Duplicate field key for entity type.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
          examples:
            fieldDefConflict:
              value:
                type: https://nene-records.dev/problems/field-def-conflict
                title: Conflict
                status: 409
                detail: A field definition with this key already exists for the entity type.
                instance: /api/v1/field-defs
    FieldKeyNotRegistered:
      description: Field key is not registered for the entity type.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
          examples:
            fieldKeyNotRegistered:
              value:
                type: https://nene-records.dev/problems/field-key-not-registered
                title: Field Key Not Registered
                status: 422
                detail: The field key is not registered for this entity type.
                instance: /api/v1/text-fields
    FieldTypeMismatch:
      description: Field key is registered with a different data type.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
          examples:
            fieldTypeMismatch:
              value:
                type: https://nene-records.dev/problems/field-type-mismatch
                title: Field Type Mismatch
                status: 422
                detail: The field key is registered with a different data type.
                instance: /api/v1/text-fields
    PayloadTooLarge:
      description: Uploaded file exceeds size limit.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
    ValidationFailed:
      description: Validation failed.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ValidationProblemDetails'
          examples:
            validationFailed:
              value:
                type: https://nene-records.dev/problems/validation-failed
                title: Validation Failed
                status: 422
                detail: One or more fields failed validation.
                instance: /api/v1/entity-types
                errors:
                  - field: slug
                    message: Slug is required.
                    code: required
    InternalServerError:
      description: Internal server error.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
          examples:
            internal:
              value:
                type: https://nene-records.dev/problems/internal-server-error
                title: Internal Server Error
                status: 500
                detail: An unexpected error occurred.
                instance: /api/v1/entity-types
  schemas:
    AccountResponse:
      type: object
      required: [slug, name, plan, custom_domain, entitlements, usage]
      properties:
        slug:
          type: string
        name:
          type: string
        plan:
          type: string
        custom_domain:
          type: string
          nullable: true
        entitlements:
          type: object
          required: [custom_domain_allowed, max_records, max_storage_bytes, max_admin_users]
          properties:
            custom_domain_allowed:
              type: boolean
            max_records:
              type: integer
              nullable: true
              description: 'null = unlimited'
            max_storage_bytes:
              type: integer
              format: int64
              nullable: true
            max_admin_users:
              type: integer
              nullable: true
        usage:
          type: object
          required: [records]
          properties:
            records:
              type: integer
    WxrPlannedItem:
      type: object
      required: [title, slug, entity_type, status, tags]
      properties:
        title:
          type: string
        slug:
          type: string
        entity_type:
          type: string
        status:
          type: string
        tags:
          type: array
          items:
            type: string
    WxrSkippedItem:
      type: object
      required: [title, reason]
      properties:
        title:
          type: string
        reason:
          type: string
    WxrImportPlanResponse:
      type: object
      required:
        - mode
        - planned_count
        - skipped_count
        - counts_by_entity_type
        - counts_by_status
        - tags
        - warnings
        - planned
        - skipped
      properties:
        mode:
          type: string
          enum: [preview]
        planned_count:
          type: integer
        skipped_count:
          type: integer
        counts_by_entity_type:
          type: object
          additionalProperties:
            type: integer
        counts_by_status:
          type: object
          additionalProperties:
            type: integer
        tags:
          type: array
          items:
            type: string
        warnings:
          type: array
          items:
            type: string
        planned:
          type: array
          items:
            $ref: '#/components/schemas/WxrPlannedItem'
        skipped:
          type: array
          items:
            $ref: '#/components/schemas/WxrSkippedItem'
    WxrImportResultResponse:
      type: object
      required:
        - mode
