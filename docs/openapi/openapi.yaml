    ThemeTokenSet:
      type: object
      description: >-
        Map of contract token name (no leading --) to a CSS value. Values are
        sanitised server-side; only safe CSS is emitted to the public site.
      additionalProperties:
        type: string
        minLength: 1
    ThemeManifest:
      type: object
      description: Runtime theme manifest (public-theme.schema.json shape).
      required:
        - id
        - name
        - version
        - supportsModes
        - tokens
      properties:
        id:
          type: string
          pattern: '^[a-z][a-z0-9-]{1,40}$'
        name:
          type: string
          minLength: 1
          maxLength: 80
        version:
          type: string
          pattern: '^[0-9]+\.[0-9]+\.[0-9]+$'
        description:
          type: string
          maxLength: 280
          description: Optional blurb shown under the theme name in the picker.
        author:
          type: string
          maxLength: 80
          description: Optional author/credit shown in the picker.
        supportsModes:
          type: array
          items:
            type: string
            enum: [light, dark]
          minItems: 2
        tokens:
          type: object
          required:
            - light
            - dark
          properties:
            light:
              $ref: '#/components/schemas/ThemeTokenSet'
            dark:
              $ref: '#/components/schemas/ThemeTokenSet'
          additionalProperties: false
        flags:
          type: object
          additionalProperties:
            type: string
        knobs:
          type: object
          additionalProperties: true
        fonts:
          type: array
          items:
            type: object
            additionalProperties: true
        assets:
          type: object
          description: >-
            Optional asset slots (preview/hero/logo). Each value is a media id
            (integer) or a safe bundle-relative path; external URLs and data:
            are rejected server-side. See runtime-themes.md §8.
          additionalProperties: true
      additionalProperties: true
    ThemeResponse:
      type: object
      required:
        - theme_key
        - name
        - version
        - manifest
        - thumbnail_url
        - created_at
        - updated_at
      properties:
        theme_key:
          type: string
        name:
          type: string
        version:
          type: string
        manifest:
          $ref: '#/components/schemas/ThemeManifest'
        thumbnail_url:
          type: string
          description: >-
            Resolved preview image URL from `manifest.assets.preview` (a media
            id). Empty when there is no preview; the picker then derives a colour
            swatch from the theme's tokens.
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      additionalProperties: false
    ThemeListResponse:
      type: object
      required:
        - items
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ThemeResponse'
      additionalProperties: false
    ThemePreviewResponse:
      type: object
      description: Computed (no-browser) preview of a theme manifest (#433).
      required:
        - valid
        - errors
        - applied
        - dropped
        - contrast
        - warnings
      properties:
        valid:
          type: boolean
          description: Whether the manifest passes structural validation.
        errors:
          type: array
          description: Validation errors (empty when valid).
          items:
            type: object
            additionalProperties: true
        applied:
          type: object
          description: Per-mode tokens that would actually render (safe-filtered).
          properties:
            light:
              type: object
              additionalProperties:
                type: string
            dark:
              type: object
              additionalProperties:
                type: string
          additionalProperties: false
        dropped:
          type: array
          description: Tokens removed by the safety filter, with reason.
          items:
            type: object
            additionalProperties: true
        contrast:
          type: object
          description: WCAG contrast rows per mode (pair / ratio / aa / aaa / computable).
          properties:
            light:
              type: array
              items:
                type: object
                additionalProperties: true
            dark:
              type: array
              items:
                type: object
                additionalProperties: true
          additionalProperties: false
        warnings:
          type: array
          items:
            type: string
      additionalProperties: false
    ThemeAuthoringGuideResponse:
      type: object
      description: >-
        Machine-usable guide for authoring runtime themes over MCP. The
        `contract` block is derived from the server-side validator.
      required:
        - summary
        - authentication
        - contract
        - renderModel
        - tokenDocs
        - flagDocs
        - recipes
        - exampleManifest
        - optionalFields
        - commonMistakes
        - relatedTools
      properties:
        summary:
          type: string
        authentication:
          type: string
        contract:
          type: object
          description: >-
            What a manifest must satisfy: required tokens, flag enums, token
            value rules, reserved ids and id/version patterns.
          additionalProperties: true
        renderModel:
          type: object
          description: >-
            How a runtime theme actually renders: base engine + tokens (CSS
            vars) + flags (data-* attributes). Includes the optional engine
            tokens beyond the colour contract, flag→attribute map and the
            WCAG AA contrast target.
          additionalProperties: true
        tokenDocs:
          type: object
          description: >-
            Per required-token semantics: { purpose, pairsWith }. pairsWith names
            the token this one must contrast against (or empty).
          additionalProperties:
            type: object
            additionalProperties: true
        flagDocs:
          type: object
          description: What each structural flag controls.
          additionalProperties:
            type: string
        recipes:
          type: array
          items:
            type: object
            additionalProperties: true
        exampleManifest:
          $ref: '#/components/schemas/ThemeManifest'
        optionalFields:
          type: object
          description: Shapes and examples for the optional fonts and assets blocks.
          additionalProperties: true
        commonMistakes:
          type: array
          items:
            type: string
        relatedTools:
          type: object
          additionalProperties:
            type: string
      additionalProperties: false
    ThemeEngineCssResponse:
      type: object
      description: Deployed public-site base engine CSS (#448).
      required:
        - source
        - bytes
        - css
        - note
      properties:
        source:
          type: string
          description: Repo-relative path of the engine CSS.
        bytes:
          type: integer
          description: Length of the returned CSS in bytes.
        css:
          type: string
          description: The full base engine stylesheet (includes flag implementations).
        note:
          type: string
      additionalProperties: false


