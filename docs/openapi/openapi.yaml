    get:
      tags:
        - PublicConsumer
      summary: Get a record's permalink-derived breadcrumb and child pages
      description: >
        Returns the breadcrumb trail and direct child pages derived from a record's
        custom permalink path (#651 PR2). Empty arrays for missing, unpublished, or
        flat (`/{type}/{slug}`) records. The SSR shell renders this from the bootstrap
        on first paint; the SPA refetches here so client-side navigation stays correct.
      operationId: getPublicRecordHierarchy
