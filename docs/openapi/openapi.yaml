      description: Permanently deletes a runtime theme by its key.
      operationId: deleteTheme
      parameters:
        - name: key
          in: path
          required: true
          description: Theme key (manifest id).
          schema:
            type: string
            pattern: '^[a-z][a-z0-9-]{1,40}$'
      responses:
        '204':
