openapi: 3.1.0
info:
  title: NeNe Records API
  version: 0.1.0
  description: >
    NeNe Records public API contract — entity_types, field_defs, entities, tags, entity_tags, entity_relations, text_fields, int_fields, enum_fields, bool_fields, and datetime_fields CRUD (MVP + Phase 2 registry + Phase 3 tags/relations).
servers:
  - url: http://localhost:8080
    description: Local development server
tags:
  - name: System
    description: Runtime health endpoints.
  - name: EntityTypes
    description: Entity type schema definitions.
  - name: Entities
    description: Entity instances bound to an entity type.
  - name: FieldDefs
    description: Registered field definitions per entity type.
  - name: TextFields
    description: Typed text field values on entities.
  - name: IntFields
    description: Typed integer field values on entities.
  - name: EnumFields
    description: Typed enum field values on entities.
  - name: BoolFields
    description: Typed boolean field values on entities.
  - name: DateTimeFields
    description: Typed datetime field values on entities.
  - name: Tags
    description: Tag definitions for entity classification.
  - name: EntityTags
    description: Tags attached to entity instances.
  - name: EntityRelations
    description: Typed relation links between entity instances.
paths:
  /health:
    get:
      tags:
        - System
      summary: Health endpoint
      description: Operational health check (NENE2 runtime).
      operationId: getHealth
      responses:
        '200':
          description: Healthy response (no checks configured).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
              examples:
                ok:
                  summary: Healthy response (no checks)
                  value:
                    status: ok
                    service: NENE2
        '500':
          $ref: '#/components/responses/InternalServerError'
  /api/v1/entity-types:
    get:
      tags:
        - EntityTypes
      summary: List entity types
      description: Returns a paginated list of entity types.
      operationId: listEntityTypes
      parameters:
        - $ref: '#/components/parameters/LimitQuery'
        - $ref: '#/components/parameters/OffsetQuery'
      responses:
        '200':
          description: Paginated entity type list.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EntityTypeListResponse'
              examples:
                ok:
                  summary: Empty list
                  value:
                    items: []
                    limit: 20
                    offset: 0
        '422':
          $ref: '#/components/responses/ValidationFailed'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      tags:
        - EntityTypes
      summary: Create entity type
      description: Creates a new entity type with a unique slug.
      operationId: createEntityType
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateEntityTypeRequest'
            examples:
              ok:
                value:
                  name: Article
                  slug: article
      responses:
        '201':
          description: Entity type created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EntityTypeResponse'
              examples:
                ok:
                  value:
                    id: 1
                    name: Article
                    slug: article
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationFailed'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /api/v1/entity-types/{id}:
    get:
      tags:
        - EntityTypes
      summary: Get entity type by id
      operationId: getEntityTypeById
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: Entity type found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EntityTypeResponse'
              examples:
                ok:
                  value:
                    id: 1
                    name: Article
                    slug: article
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    put:
      tags:
        - EntityTypes
      summary: Update entity type
      operationId: updateEntityType
      parameters:
        - $ref: '#/components/parameters/IdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateEntityTypeRequest'
            examples:
              ok:
                value:
                  name: Blog Post
                  slug: blog-post
      responses:
        '200':
          description: Entity type updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EntityTypeResponse'
              examples:
                ok:
                  value:
                    id: 1
                    name: Blog Post
                    slug: blog-post
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationFailed'
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      tags:
        - EntityTypes
      summary: Delete entity type
      description: Permanently deletes an entity type (hard delete).
      operationId: deleteEntityType
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '204':
          description: Entity type deleted.
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /api/v1/entities:
    get:
      tags:
        - Entities
      summary: List entities
      description: Returns non-deleted entities, optionally filtered by entity type, tags, and relation fields.
      operationId: listEntities
      parameters:
        - $ref: '#/components/parameters/LimitQuery'
        - $ref: '#/components/parameters/OffsetQuery'
        - $ref: '#/components/parameters/EntityTypeIdQuery'
        - $ref: '#/components/parameters/TagsQuery'
        - $ref: '#/components/parameters/TagQuery'
        - $ref: '#/components/parameters/RelationFilterQuery'
      responses:
        '200':
          description: Paginated entity list.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EntityListResponse'
              examples:
                ok:
                  summary: Empty list
                  value:
                    items: []
                    limit: 20
                    offset: 0
                    total: 0
        '422':
          $ref: '#/components/responses/ValidationFailed'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      tags:
        - Entities
      summary: Create entity
      operationId: createEntity
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateEntityRequest'
            examples:
              ok:
                value:
                  entity_type_id: 1
      responses:
        '201':
          description: Entity created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EntityResponse'
              examples:
                ok:
                  value:
                    id: 1
                    entity_type_id: 1
                    is_deleted: false
                    deleted_at: null
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationFailed'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /api/v1/entities/{id}:
    get:
      tags:
        - Entities
      summary: Get entity by id
      operationId: getEntityById
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: Entity found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EntityResponse'
              examples:
                ok:
                  value:
                    id: 1
                    entity_type_id: 1
                    is_deleted: false
                    deleted_at: null
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    put:
      tags:
        - Entities
      summary: Update entity
      operationId: updateEntity
      parameters:
        - $ref: '#/components/parameters/IdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateEntityRequest'
            examples:
              ok:
                value:
                  entity_type_id: 2
      responses:
        '200':
          description: Entity updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EntityResponse'
              examples:
                ok:
                  value:
                    id: 1
                    entity_type_id: 2
                    is_deleted: false
                    deleted_at: null
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationFailed'
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      tags:
        - Entities
      summary: Soft delete entity
      operationId: deleteEntity
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '204':
          description: Entity soft-deleted.
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /api/v1/entities/{entityId}/tags:
    get:
      tags:
        - EntityTags
      summary: List tags attached to entity
      operationId: listEntityTags
      parameters:
        - $ref: '#/components/parameters/EntityIdPath'
      responses:
        '200':
          description: Tags attached to the entity.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EntityTagListResponse'
              examples:
                ok:
                  value:
                    items: []
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      tags:
        - EntityTags
      summary: Attach tag to entity
      operationId: attachEntityTag
      parameters:
        - $ref: '#/components/parameters/EntityIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AttachEntityTagRequest'
            examples:
              ok:
                value:
                  tag_id: 1
      responses:
        '201':
          description: Tag attached.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TagResponse'
              examples:
                ok:
                  value:
                    id: 1
                    slug: featured
                    name: Featured
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationFailed'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /api/v1/entities/{entityId}/tags/{tagId}:
    delete:
      tags:
        - EntityTags
      summary: Detach tag from entity
      operationId: detachEntityTag
      parameters:
        - $ref: '#/components/parameters/EntityIdPath'
        - $ref: '#/components/parameters/TagIdPath'
      responses:
        '204':
          description: Tag detached.
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /api/v1/entities/{entityId}/relations:
    get:
      tags:
        - EntityRelations
      summary: List relations attached to entity
      operationId: listEntityRelations
      parameters:
        - $ref: '#/components/parameters/EntityIdPath'
        - name: field_key
          in: query
          required: true
          schema:
            type: string
            minLength: 1
      responses:
        '200':
          description: Relations for the given field key.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EntityRelationListResponse'
              examples:
                ok:
                  value:
                    items: []
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationFailed'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      tags:
        - EntityRelations
      summary: Attach relation target to entity
      operationId: attachEntityRelation
      parameters:
        - $ref: '#/components/parameters/EntityIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AttachEntityRelationRequest'
            examples:
              ok:
                value:
                  field_key: author
                  target_entity_id: 2
      responses:
        '201':
          description: Relation attached.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EntityRelationItemResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationFailed'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /api/v1/entities/{entityId}/relations/{targetEntityId}:
    delete:
      tags:
        - EntityRelations
      summary: Detach relation target from entity
      operationId: detachEntityRelation
      parameters:
        - $ref: '#/components/parameters/EntityIdPath'
        - name: targetEntityId
          in: path
          required: true
          schema:
            type: integer
            format: int64
            minimum: 1
        - name: field_key
          in: query
          required: true
          schema:
            type: string
            minLength: 1
      responses:
        '204':
          description: Relation detached.
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationFailed'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /api/v1/field-defs:
    get:
      tags:
        - FieldDefs
      summary: List field definitions
      description: Returns non-deleted field definitions, optionally filtered by entity type.
      operationId: listFieldDefs
      parameters:
        - $ref: '#/components/parameters/LimitQuery'
        - $ref: '#/components/parameters/OffsetQuery'
        - $ref: '#/components/parameters/EntityTypeIdQuery'
      responses:
        '200':
          description: Paginated field definition list.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FieldDefListResponse'
              examples:
                ok:
                  summary: Empty list
                  value:
                    items: []
                    limit: 20
                    offset: 0
        '422':
          $ref: '#/components/responses/ValidationFailed'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      tags:
        - FieldDefs
      summary: Create field definition
      description: Registers a field key and data type for an entity type.
      operationId: createFieldDef
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateFieldDefRequest'
            examples:
              ok:
                value:
                  entity_type_id: 1
                  field_key: title
                  data_type: text
      responses:
        '201':
          description: Field definition created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FieldDefResponse'
              examples:
                ok:
                  value:
                    id: 1
                    entity_type_id: 1
                    field_key: title
                    data_type: text
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/FieldDefConflict'
        '422':
          $ref: '#/components/responses/ValidationFailed'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /api/v1/field-defs/{id}:
    get:
      tags:
        - FieldDefs
      summary: Get field definition by id
      operationId: getFieldDefById
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: Field definition found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FieldDefResponse'
              examples:
                ok:
                  value:
                    id: 1
                    entity_type_id: 1
                    field_key: title
                    data_type: text
        '404':
          $ref: '#/components/responses/FieldDefNotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    put:
      tags:
        - FieldDefs
      summary: Update field definition
      operationId: updateFieldDef
      parameters:
        - $ref: '#/components/parameters/IdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateFieldDefRequest'
            examples:
              ok:
                value:
                  entity_type_id: 1
                  field_key: headline
                  data_type: text
      responses:
        '200':
          description: Field definition updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FieldDefResponse'
              examples:
                ok:
                  value:
                    id: 1
                    entity_type_id: 1
                    field_key: headline
                    data_type: text
        '404':
          $ref: '#/components/responses/FieldDefNotFound'
        '409':
          $ref: '#/components/responses/FieldDefConflict'
        '422':
          $ref: '#/components/responses/ValidationFailed'
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      tags:
        - FieldDefs
      summary: Soft delete field definition
      operationId: deleteFieldDef
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '204':
          description: Field definition soft-deleted.
        '404':
          $ref: '#/components/responses/FieldDefNotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /api/v1/text-fields:
    get:
      tags:
        - TextFields
      summary: List text fields
      description: Returns non-deleted text fields.
      operationId: listTextFields
      parameters:
        - $ref: '#/components/parameters/LimitQuery'
        - $ref: '#/components/parameters/OffsetQuery'
        - $ref: '#/components/parameters/EntityIdQuery'
        - $ref: '#/components/parameters/EntityTypeIdQuery'
      responses:
        '200':
          description: Paginated text field list.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TextFieldListResponse'
              examples:
                ok:
                  summary: Empty list
                  value:
                    items: []
                    limit: 20
                    offset: 0
        '422':
          $ref: '#/components/responses/ValidationFailed'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      tags:
        - TextFields
      summary: Create text field
      operationId: createTextField
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTextFieldRequest'
            examples:
              ok:
                value:
                  entity_id: 1
                  field_key: title
                  value: Hello world
      responses:
        '201':
          description: Text field created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TextFieldResponse'
              examples:
                ok:
                  value:
                    id: 1
                    entity_id: 1
                    field_key: title
                    value: Hello world
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          description: Validation failed, unregistered field key, or field type mismatch.
          content:
            application/problem+json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/ValidationProblemDetails'
                  - $ref: '#/components/schemas/ProblemDetails'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /api/v1/text-fields/{id}:
    get:
      tags:
        - TextFields
      summary: Get text field by id
      operationId: getTextFieldById
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: Text field found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TextFieldResponse'
              examples:
                ok:
                  value:
                    id: 1
                    entity_id: 1
                    field_key: title
                    value: Hello world
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    put:
      tags:
        - TextFields
      summary: Update text field
      operationId: updateTextField
      parameters:
        - $ref: '#/components/parameters/IdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTextFieldRequest'
            examples:
              ok:
                value:
                  field_key: title
                  value: Updated title
      responses:
        '200':
          description: Text field updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TextFieldResponse'
              examples:
                ok:
                  value:
                    id: 1
                    entity_id: 1
                    field_key: title
                    value: Updated title
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          description: Validation failed, unregistered field key, or field type mismatch.
          content:
            application/problem+json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/ValidationProblemDetails'
                  - $ref: '#/components/schemas/ProblemDetails'
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      tags:
        - TextFields
      summary: Soft delete text field
      operationId: deleteTextField
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '204':
          description: Text field soft-deleted.
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /api/v1/int-fields:
    get:
      tags:
        - IntFields
      summary: List int fields
      description: Returns non-deleted int fields.
      operationId: listIntFields
      parameters:
        - $ref: '#/components/parameters/LimitQuery'
        - $ref: '#/components/parameters/OffsetQuery'
        - $ref: '#/components/parameters/EntityIdQuery'
      responses:
        '200':
          description: Paginated int field list.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IntFieldListResponse'
              examples:
                ok:
                  summary: Empty list
                  value:
                    items: []
                    limit: 20
                    offset: 0
        '422':
          $ref: '#/components/responses/ValidationFailed'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      tags:
        - IntFields
      summary: Create int field
      operationId: createIntField
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateIntFieldRequest'
            examples:
              ok:
                value:
                  entity_id: 1
                  field_key: count
                  value: 42
      responses:
        '201':
          description: Int field created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IntFieldResponse'
              examples:
                ok:
                  value:
                    id: 1
                    entity_id: 1
                    field_key: count
                    value: 42
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          description: Validation failed, unregistered field key, or field type mismatch.
          content:
            application/problem+json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/ValidationProblemDetails'
                  - $ref: '#/components/schemas/ProblemDetails'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /api/v1/int-fields/{id}:
    get:
      tags:
        - IntFields
      summary: Get int field by id
      operationId: getIntFieldById
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: Int field found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IntFieldResponse'
              examples:
                ok:
                  value:
                    id: 1
                    entity_id: 1
                    field_key: count
                    value: 42
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    put:
      tags:
        - IntFields
      summary: Update int field
      operationId: updateIntField
      parameters:
        - $ref: '#/components/parameters/IdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateIntFieldRequest'
            examples:
              ok:
                value:
                  field_key: count
                  value: 99
      responses:
        '200':
          description: Int field updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IntFieldResponse'
              examples:
                ok:
                  value:
                    id: 1
                    entity_id: 1
                    field_key: count
                    value: 99
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          description: Validation failed, unregistered field key, or field type mismatch.
          content:
            application/problem+json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/ValidationProblemDetails'
                  - $ref: '#/components/schemas/ProblemDetails'
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      tags:
        - IntFields
      summary: Soft delete int field
      operationId: deleteIntField
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '204':
          description: Int field soft-deleted.
        '404':
