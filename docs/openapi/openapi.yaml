  /api/v1/themes:
    get:
      tags:
        - Themes
      summary: List runtime themes
      description: Returns all runtime (data-driven) themes for the organization.
      operationId: listThemes
      responses:
        '200':
          description: Theme list.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ThemeListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      tags:
        - Themes
      summary: Create runtime theme
      description: >-
        Registers a new runtime theme. The request body is the theme manifest
        (public-theme.schema.json shape). The server validates structure and
        sanitises token values before storing; only known CSS variables with
        safe values are ever emitted to the public site.
      operationId: createTheme
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ThemeManifest'
      responses:
        '201':
          description: Created theme.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ThemeResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationFailed'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /api/v1/themes/preview:
    post:
      tags:
        - Themes
      summary: Preview a theme manifest (computed)
      description: >-
        Non-persistent dry-run: validates a manifest and returns the tokens that
        would actually render (safe-filtered), the ones dropped, and WCAG
        contrast for key pairs in both modes. Lets ClaudeDesign self-correct
        before committing via createTheme/updateTheme. Always 200 — issues are
        reported in the body. See theme-preview.md.
      operationId: previewTheme
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ThemeManifest'
      responses:
        '200':
          description: Computed preview report.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ThemePreviewResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /api/v1/themes/authoring-guide:
    get:
      tags:
        - Themes
      summary: Theme authoring guide
      description: >-
        In-band guide for AI agents (ClaudeDesign) registering runtime themes
        over MCP. Returns the manifest contract (required tokens, flag enums,
        token value rules, reserved ids), recipes and a minimal valid example —
        derived from the server-side validator so it never drifts from what is
        enforced. See #440.
      operationId: getThemeAuthoringGuide
      responses:
        '200':
          description: Authoring guide.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ThemeAuthoringGuideResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
