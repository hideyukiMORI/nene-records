# Production stack: the single-origin PHP app + MySQL (+ cron). No dev tooling
# (phpMyAdmin / Mailpit / Vite). The app is a self-contained immutable image
# (docker/php/Dockerfile.prod): SPA/SSR assets built in-image, deps installed
# --no-dev, code + vendor + dist baked (no runtime bind-mounts). nene2 (a sibling
# path repo) is injected via the `nene2` named build context — no parent context.
#
# Usage:
#   1. set required secrets in .env (NENE2_LOCAL_JWT_SECRET, DB_PASSWORD,
#      MYSQL_ROOT_PASSWORD) — see .env.example / docs/deployment.md
#   2. docker compose -f compose.prod.yaml up -d --build
#   3. NENE_INSTALL_ADMIN_EMAIL=... NENE_INSTALL_ADMIN_PASSWORD=... \
#        docker compose -f compose.prod.yaml exec -T app composer app:install
services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile.prod
      additional_contexts:
        nene2: ../NENE2
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      # Fixed for production — not interpolated, so a stray dev .env (Compose
      # auto-loads .env) can never accidentally enable debug here.
      APP_ENV: production
      APP_DEBUG: "false"
      APP_NAME: ${APP_NAME:-NeNe Records}
      NENE2_MACHINE_API_KEY: ${NENE2_MACHINE_API_KEY:-}
      NENE2_LOCAL_JWT_SECRET: ${NENE2_LOCAL_JWT_SECRET:?set a strong JWT secret in .env}
      PROBLEM_DETAILS_BASE_URL: ${PROBLEM_DETAILS_BASE_URL:-https://nene-records.dev/problems/}
      DB_ENV: ${DB_ENV:-production}
      DB_ADAPTER: mysql
      DB_HOST: ${DB_HOST:-mysql}
      DB_PORT: ${DB_PORT:-3306}
      DB_NAME: ${DB_NAME:-nene_records}
      DB_USER: ${DB_USER:-nene_records}
      DB_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD in .env}
      DB_CHARSET: utf8mb4
      # Symfony Mailer requires a scheme; default to the null transport so a deploy
      # without outbound mail configured boots cleanly instead of fataling on "".
      MAIL_DSN: ${MAIL_DSN:-null://null}
      MAIL_FROM: ${MAIL_FROM:-noreply@example.com}
    ports:
      - "${NENE_RECORDS_PROD_PORT:-8080}:80"
    # No volumes: code, vendor and built assets are baked into the image.
    # No command: the image CMD is docker/app/entrypoint.prod.sh (migrate + serve).

  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_NAME:-nene_records}
      MYSQL_USER: ${DB_USER:-nene_records}
      MYSQL_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD in .env}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?set MYSQL_ROOT_PASSWORD in .env}
    volumes:
      - mysql-prod-data:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping -h localhost -u$${MYSQL_USER} -p$${MYSQL_PASSWORD} --silent",
        ]
      interval: 5s
      timeout: 5s
      retries: 20

  cron:
    image: alpine:3.21
    restart: unless-stopped
    depends_on:
      - app
    volumes:
      - ./docker/cron/crontab:/etc/crontabs/root:ro
    command: crond -f -l 6

volumes:
  mysql-prod-data:
