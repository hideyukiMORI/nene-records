services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      APP_ENV: ${APP_ENV:-local}
      APP_DEBUG: ${APP_DEBUG:-true}
      APP_NAME: ${APP_NAME:-NeNe Records}
      NENE2_MACHINE_API_KEY: ${NENE2_MACHINE_API_KEY:-}
      NENE2_LOCAL_JWT_SECRET: ${NENE2_LOCAL_JWT_SECRET:-}
      PROBLEM_DETAILS_BASE_URL: ${PROBLEM_DETAILS_BASE_URL:-https://nene-records.dev/problems/}
      DATABASE_URL: ${DATABASE_URL:-}
      DB_ENV: ${DB_ENV:-local}
      DB_ADAPTER: ${DB_ADAPTER:-mysql}
      DB_HOST: ${DB_HOST:-mysql}
      DB_PORT: ${DB_PORT:-3306}
      DB_NAME: ${DB_NAME:-nene_records}
      DB_USER: ${DB_USER:-nene_records}
      DB_PASSWORD: ${DB_PASSWORD:-nene_records}
      DB_CHARSET: ${DB_CHARSET:-utf8mb4}
      MAIL_DSN: ${MAIL_DSN:-smtp://mailpit:1025}
      MAIL_FROM: ${MAIL_FROM:-noreply@nene-records.local}
    ports:
      - "${NENE_RECORDS_PORT:-8080}:80"
    volumes:
      - .:/var/www/html
      - ../NENE2:/var/www/NENE2:ro
      - composer-cache:/root/.composer/cache
    command: ["/bin/sh", "/var/www/html/docker/app/entrypoint.sh"]

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: ${DB_NAME:-nene_records}
      MYSQL_USER: ${DB_USER:-nene_records}
      MYSQL_PASSWORD: ${DB_PASSWORD:-nene_records}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-nene_records_root}
    ports:
      - "${NENE_RECORDS_MYSQL_PORT:-3307}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping -h localhost -u$${MYSQL_USER} -p$${MYSQL_PASSWORD} --silent",
        ]
      interval: 5s
      timeout: 5s
      retries: 20

  phpmyadmin:
    build:
      context: ./docker/phpmyadmin
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
    ports:
      - "${NENE_RECORDS_PHPMYADMIN_PORT:-8081}:80"

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "${NENE_RECORDS_MAILPIT_WEB_PORT:-8025}:8025"
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1

volumes:
  mysql-data:
  composer-cache:
